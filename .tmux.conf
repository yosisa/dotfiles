# Prefix key
set -g prefix C-z
unbind -T prefix z

# Options
set -g default-terminal "tmux-256color"
set -g mouse on
set -g extended-keys always
set -g extended-keys-format csi-u
set -g focus-events on
set -g set-clipboard on
set -g history-limit 100000
set -sg escape-time 0
set -g detach-on-destroy no-detached

# Terminal capability
set -as terminal-features ',xterm-256color:RGB'
set -as terminal-features ',ghostty:RGB'
set -as terminal-features ',wezterm:RGB'
set -as terminal-features ',kitty:RGB'

# Zoom
bind -T prefix m resize-pane -Z

# Cycle panes in current window
bind -n M-j select-pane -t :.+
bind -n M-k select-pane -t :.-

# Cycle windows in current session
bind -n M-l next-window
bind -n M-h previous-window

bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9
bind -n M-0 select-window -t :0

# Toggle synchronize panes
bind i setw synchronize-panes

# Window/Pane number
set -g base-index 1
setw -g pane-base-index 1

# Copy mode bindings
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

bind C-e run-shell tmux-edit-pane

set -ga update-environment "ALL_PROXY"
set -ga update-environment "HTTP_PROXY"
set -ga update-environment "HTTPS_PROXY"
set -ga update-environment "all_proxy"
set -ga update-environment "http_proxy"
set -ga update-environment "https_proxy"

# List of plugins
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'catppuccin/tmux#v2.3.0'

set -g @continuum-restore 'on'
set -g @extrakto_copy_key "tab"
set -g @extrakto_insert_key "enter"

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"
set -g @catppuccin_application_text " #T"

run '~/.tmux/plugins/tmux/catppuccin.tmux'

set -g status-position top
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_application}"

set -g set-titles on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

bind f display-popup -E -w 80% -h 80%
bind s display-popup -E -w 80% -h 70% -d '#{pane_current_path}' -T 'Sesh' tv sesh
bind g display-popup -E -w 90% -h 90% lazygit
